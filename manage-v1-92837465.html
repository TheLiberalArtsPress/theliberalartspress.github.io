    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const lib = window.lucideReact || window.LucideReact || {};
        const FallbackIcon = () => <span className="inline-block w-4 h-4 bg-zinc-300 rounded-full animate-pulse"></span>;
        
        const LayoutDashboard = lib.LayoutDashboard || FallbackIcon;
        const BookOpen = lib.BookOpen || FallbackIcon;
        const MessageSquare = lib.MessageSquare || FallbackIcon;
        const Truck = lib.Truck || FallbackIcon;
        const Database = lib.Database || FallbackIcon;
        const Globe = lib.Globe || FallbackIcon;
        const Menu = lib.Menu || FallbackIcon;
        const ChevronRight = lib.ChevronRight || FallbackIcon;
        const ChevronDown = lib.ChevronDown || FallbackIcon;
        const ExternalLink = lib.ExternalLink || FallbackIcon;
        const Plus = lib.Plus || FallbackIcon;
        const Edit2 = lib.Edit2 || FallbackIcon;
        const Trash2 = lib.Trash2 || FallbackIcon;
        const Zap = lib.Zap || FallbackIcon;
        const Clock = lib.Clock || FallbackIcon;
        const Save = lib.Save || FallbackIcon;
        const X = lib.X || FallbackIcon;
        const Lock = lib.Lock || FallbackIcon;
        const Bot = lib.Bot || FallbackIcon;
        const User = lib.User || FallbackIcon;
        const CheckCircle = lib.CheckCircle || FallbackIcon;
        const Search = lib.Search || FallbackIcon;
        const Sparkles = lib.Sparkles || FallbackIcon;
        const FileEdit = lib.FileEdit || FallbackIcon;
        const Star = lib.Star || FallbackIcon;
        const ShieldCheck = lib.ShieldCheck || FallbackIcon;
        const Phone = lib.Phone || FallbackIcon;
        const Mail = lib.Mail || FallbackIcon;
        const TrendingUp = lib.TrendingUp || FallbackIcon;
        const ShoppingCart = lib.ShoppingCart || FallbackIcon;
        const SettingsIcon = lib.Settings || FallbackIcon;
        const Palette = lib.Palette || FallbackIcon;

        const availableIcons = {
            LayoutDashboard: { icon: LayoutDashboard, color: 'text-blue-500' },
            TrendingUp: { icon: TrendingUp, color: 'text-blue-500' },
            Database: { icon: Database, color: 'text-indigo-500' },
            Truck: { icon: Truck, color: 'text-emerald-500' },
            BookOpen: { icon: BookOpen, color: 'text-red-500' },
            User: { icon: User, color: 'text-purple-500' },
            MessageSquare: { icon: MessageSquare, color: 'text-pink-500' },
            Bot: { icon: Bot, color: 'text-pink-600' },
            Zap: { icon: Zap, color: 'text-orange-500' },
            Sparkles: { icon: Sparkles, color: 'text-yellow-500' },
            Star: { icon: Star, color: 'text-yellow-400' },
            ShoppingCart: { icon: ShoppingCart, color: 'text-cyan-500' },
            ExternalLink: { icon: ExternalLink, color: 'text-zinc-500' }
        };

        // 🔥 更新為最新金鑰
        const _0x4a21 = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3aVllUVVIVHdyb1FSR2U5ZlN2a1h3VDk1RVpLRFdyZndIcHRxRDRUY3E5Q1JPTjhZc2MtdENHWURkb2Q3LWJnclQvZXhlYw==";
        const GAS_URL = atob(_0x4a21);

        // 🔥 前端圖片 URL 智慧轉換工具：支援直接填寫 Drive ID、Base64 或完整網址
        const formatImageUrl = (url) => {
            if (!url) return '';
            let strUrl = String(url).trim();
            // 1. 如果是 Base64 或一般圖床網址，直接保留
            if (strUrl.startsWith('data:image') || (strUrl.startsWith('http') && !strUrl.includes('drive.google.com'))) {
                return strUrl;
            }
            // 2. 如果貼上的是完整的 Google Drive 網址，擷取 ID 並轉換為直連加速網址
            const driveMatch = strUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || strUrl.match(/id=([a-zA-Z0-9_-]+)/);
            if (driveMatch) {
                return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
            }
            // 3. 如果「只填寫 Drive ID」(大於 20 個字元的英數字串)，自動轉換為直連網址
            if (/^[a-zA-Z0-9_-]{20,}$/.test(strUrl) && !strUrl.includes("/")) {
                return `https://drive.google.com/uc?export=view&id=${strUrl}`;
            }
            return strUrl;
        };

        const fallbackAccounts = [
            { user: 'lapen', password: '1234' },
            { user: 'admin', password: '1234' },
            { user: 'e3479293', password: '588999' },
            { user: 'candyni', password: '605' }
        ];

        const defaultSettings = {
            systemName: '文史哲出版社',
            systemSubName: 'Digital CMS',
            loginBgColor: '#09090b', 
            sidebarBgColor: '#09090b', 
            sidebarActiveColor: '#4f46e5', 
            sidebarTextColor: '#a1a1aa', 
            kpiBgColor: '#ffffff',
            menuDashName: '營運分析中心', menuMarketingName: '行銷與推薦', menuBooksName: '總商品庫存',
            menuOrdersName: '銷售與物流', menuCsName: '智能客戶關係', menuExtName: '外部系統鏈接',
            menuDashIcon: 'LayoutDashboard', menuMarketingIcon: 'Sparkles', menuBooksIcon: 'Database',
            menuOrdersIcon: 'Truck', menuCsIcon: 'Bot', menuExtIcon: 'ExternalLink'
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [accountsList, setAccountsList] = useState(fallbackAccounts);
            const [selectedAccount, setSelectedAccount] = useState('lapen'); 
            
            const [books, setBooks] = useState([]);
            const [choiceBooks, setChoiceBooks] = useState([]); 
            const [carousels, setCarousels] = useState([]);
            const [orders, setOrders] = useState([]); 
            const [aiLogs, setAiLogs] = useState([]); 
            const [kpis, setKpis] = useState([]); 
            const [settings, setSettings] = useState(defaultSettings); 
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [notification, setNotification] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [bookSearchQuery, setBookSearchQuery] = useState('');

            const [showBookModal, setShowBookModal] = useState(false);
            const [editingBook, setEditingBook] = useState(null);
            const [modalType, setModalType] = useState('book');
            
            const [showCarouselModal, setShowCarouselModal] = useState(false);
            const [editingCarousel, setEditingCarousel] = useState(null);
            
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [editingOrder, setEditingOrder] = useState(null);
            
            const [showCSModal, setShowCSModal] = useState(false);
            const [editingCSLog, setEditingCSLog] = useState(null);
            const [csResponseText, setCsResponseText] = useState('');
            const [isAIGenerating, setIsAIGenerating] = useState(false);

            const [showKpiModal, setShowKpiModal] = useState(false);
            const [editingKpi, setEditingKpi] = useState(null);
            const [selectedKpiIcon, setSelectedKpiIcon] = useState('TrendingUp'); 

            const [iframeModal, setIframeModal] = useState({ isOpen: false, url: '', title: '' });

            const [expandedMenus, setExpandedMenus] = useState({
                group_dash: true, group_marketing: false, group_books: false, group_orders: false, group_cs: false, group_external: false, group_settings: false
            });

            const toggleMenu = (menuId) => setExpandedMenus(prev => ({ ...prev, [menuId]: !prev[menuId] }));

            const adminMenuConfig = [
                { id: 'group_dash', title: settings.menuDashName, icon: availableIcons[settings.menuDashIcon]?.icon || LayoutDashboard, items: [{ tab: 'dashboard', name: '營運儀表板' }] },
                { id: 'group_marketing', title: settings.menuMarketingName, icon: availableIcons[settings.menuMarketingIcon]?.icon || Sparkles, items: [
                    { tab: 'carousel', name: '首頁熱賣輪播 (Carousels)' },
                    { tab: 'choice', name: '編輯推薦書單 (Choice)' } 
                ]},
                { id: 'group_books', title: settings.menuBooksName, icon: availableIcons[settings.menuBooksIcon]?.icon || Database, items: [{ tab: 'books', name: '全部書籍管理 (Book_ALL)' }] },
                { id: 'group_orders', title: settings.menuOrdersName, icon: availableIcons[settings.menuOrdersIcon]?.icon || Truck, items: [{ tab: 'orders', name: '訂單處理中心 (Orders)' }] },
                { id: 'group_cs', title: settings.menuCsName, icon: availableIcons[settings.menuCsIcon]?.icon || Bot, items: [{ tab: 'ai', name: 'AI 客服信箱 (CS Logs)' }] },
                { id: 'group_external', title: settings.menuExtName, icon: availableIcons[settings.menuExtIcon]?.icon || ExternalLink, items: [
                    { isExternal: true, url: 'https://hanlinma.github.io/candyni/vandor.html', name: '供應商系統 (Vandor)' },
                    { isExternal: true, url: 'https://hanlinma.github.io/candyni/oder.html', name: '舊版訂單 (Oder)' }
                ]},
                { id: 'group_settings', title: '系統外觀設定', icon: SettingsIcon, items: [{ tab: 'settings', name: '全域設定與顏色 (Setting)' }] }
            ];

            const showMsg = (text) => {
                setNotification(text);
                setTimeout(() => setNotification(null), 3000);
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return String(dateStr); 
                const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'); const min = String(d.getMinutes()).padStart(2, '0');
                if (yyyy === 1899) return `${hh}:${min}`;
                return hh === '00' && min === '00' ? `${yyyy}/${mm}/${dd}` : `${yyyy}/${mm}/${dd} ${hh}:${min}`;
            };

            const syncWithGAS = async (action, payload = null) => {
                try {
                    if (action.startsWith('FETCH_')) {
                        const url = new URL(GAS_URL);
                        url.searchParams.append('action', action);
                        url.searchParams.append('key', 'Y2FuZHluaWxvdmU='); 
                        const response = await fetch(url.toString());
                        return await response.json();
                    } else {
                        const response = await fetch(GAS_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify({ action, payload, key: "Y2FuZHluaWxvdmU=" }) 
                        });
                        return await response.json();
                    }
                } catch (e) {
                    console.error("GAS Sync Error:", e);
                    return { status: 'error', msg: e.toString() };
                }
            };

            useEffect(() => {
                syncWithGAS('FETCH_SETTINGS').then(res => {
                    if (res && res.data) setSettings(prev => ({...prev, ...res.data}));
                }).catch(() => {});

                if (!isAuthenticated) {
                    syncWithGAS('FETCH_ACCOUNTS').then(res => {
                        if (res && res.data && res.data.length > 0) setAccountsList(res.data);
                    }).catch(() => {});
                }
            }, []);

            useEffect(() => {
                if (!isAuthenticated) return;
                const initData = async () => {
                    setIsLoadingData(true);
                    try {
                        const [resBooks, resOrders, resLogs, resCarousels, resChoices, resKpis] = await Promise.all([
                            syncWithGAS('FETCH_BOOKS'),
                            syncWithGAS('FETCH_ORDERS'),
                            syncWithGAS('FETCH_CS_LOGS'),
                            syncWithGAS('FETCH_CAROUSELS'),
                            syncWithGAS('FETCH_CHOICES'),
                            syncWithGAS('FETCH_KPIS')
                        ]);
                        
                        if (resBooks?.data) setBooks(resBooks.data);
                        if (resOrders?.data) setOrders(resOrders.data);
                        if (resLogs?.data) setAiLogs(resLogs.data);
                        if (resCarousels?.data) setCarousels(resCarousels.data);
                        if (resChoices?.data) setChoiceBooks(resChoices.data);
                        if (resKpis?.data) setKpis(resKpis.data);
                    } catch (err) {
                        console.error("Failed to load data", err);
                    }
                    setIsLoadingData(false);
                };
                initData();
            }, [isAuthenticated]);

            useEffect(() => {
                if (editingKpi) {
                    let rawUnit = String(editingKpi.unit || '');
                    let iconName = rawUnit.includes('||') ? rawUnit.split('||')[1] : '';
                    if (!iconName) {
                        const titleText = editingKpi.title || '';
                        if (titleText.includes('營收')) iconName = 'Database';
                        else if (titleText.includes('待處理')) iconName = 'Truck';
                        else if (titleText.includes('庫存警示')) iconName = 'BookOpen';
                        else iconName = 'TrendingUp';
                    }
                    setSelectedKpiIcon(iconName);
                } else {
                    setSelectedKpiIcon('TrendingUp');
                }
            }, [editingKpi]);

            // KPI 自動連動更新
            useEffect(() => {
                if (kpis.length === 0 || isLoadingData || !isAuthenticated) return;
                let hasChanges = false;
                const updatedKpis = kpis.map(k => {
                    let titleText = String(k.title || k.id || '');
                    let dynamicValue = k.value;
                    let rawUnit = String(k.unit || '');
                    let displayUnit = rawUnit.includes('||') ? rawUnit.split('||')[0] : rawUnit;
                    let iconName = rawUnit.includes('||') ? rawUnit.split('||')[1] : '';
                    
                    if (titleText.includes('營收')) {
                        dynamicValue = 'NT$ ' + orders.reduce((s,o)=>s+Number(o.total||0),0).toLocaleString();
                        if (!iconName) iconName = 'Database';
                    } else if (titleText.includes('待處理')) {
                        dynamicValue = String(orders.filter(o=>o.status==='處理中').length);
                        displayUnit = displayUnit || '筆';
                        if (!iconName) iconName = 'Truck';
                    } else if (titleText.includes('庫存警示')) {
                        const match = titleText.match(/<(\d+)/);
                        const threshold = match ? parseInt(match[1]) : 10;
                        dynamicValue = String(books.filter(b => {
                            if (!b.title || b.title.trim() === '' || b.title === '未命名書籍') return false;
                            const st = parseInt(b.stock);
                            return (isNaN(st) ? 0 : st) < threshold;
                        }).length);
                        displayUnit = displayUnit || '項商品';
                        if (!iconName) iconName = 'BookOpen';
                    } else {
                        if (!iconName) iconName = 'TrendingUp';
                    }

                    const combinedUnit = `${displayUnit}||${iconName}`;

                    if (String(dynamicValue) !== String(k.value) || combinedUnit !== String(k.unit)) {
                        hasChanges = true;
                        const newKpi = { ...k, value: dynamicValue, unit: combinedUnit };
                        syncWithGAS('UPDATE_KPI', newKpi);
                        return newKpi;
                    }
                    return k;
                });

                if (hasChanges) {
                    setKpis(updatedKpis);
                }
            }, [orders, books, kpis, isLoadingData, isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                const pwd = e.target.password.value;
                const accInfo = accountsList.find(a => a.user === selectedAccount);
                if (accInfo && String(accInfo.password) === String(pwd)) {
                    setIsAuthenticated(true);
                    showMsg('登入成功，正在為您載入控制中心...');
                } else { showMsg('登入失敗：密碼錯誤'); }
            };

            const filteredAdminBooks = useMemo(() => {
                const query = bookSearchQuery.toLowerCase().trim();
                const targetList = activeTab === 'choice' ? choiceBooks : books; 
                if (!query) return targetList;
                return targetList.filter(b => 
                    (b.title && b.title.toLowerCase().includes(query)) ||
                    (b.id && b.id.toString().toLowerCase().includes(query)) ||
                    (b.category && b.category.toLowerCase().includes(query))
                );
            }, [books, choiceBooks, bookSearchQuery, activeTab]);

            const handleSaveBook = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const bookData = {
                    title: formData.get('title'), category: formData.get('category'), price: parseInt(formData.get('price')) || 0, stock: parseInt(formData.get('stock')) || 0,
                    cover: formData.get('cover') || '', author: formData.get('author') || '', year: formData.get('year') || ''
                };
                
                const isChoice = modalType === 'choice';
                const currentList = isChoice ? choiceBooks : books;
                const setList = isChoice ? setChoiceBooks : setBooks;
                const updateAction = isChoice ? 'UPDATE_CHOICE' : 'UPDATE_BOOK';
                const addAction = isChoice ? 'ADD_CHOICE' : 'ADD_BOOK';

                if (editingBook) {
                    const updated = { ...editingBook, ...bookData };
                    setList(currentList.map(b => b.id === updated.id ? updated : b));
                    await syncWithGAS(updateAction, updated);
                } else {
                    const newBook = { ...bookData, id: Date.now() }; 
                    setList([newBook, ...currentList]);
                    await syncWithGAS(addAction, newBook);
                }
                setShowBookModal(false); setEditingBook(null);
                showMsg(`${isChoice ? '精選推薦' : '書籍庫存'}已更新至雲端`);
            };

            const handleDeleteBook = async (id, isChoice) => {
                if(confirm(`確定要刪除這本${isChoice ? '精選推薦' : '書籍'}嗎？`)) {
                    if (isChoice) {
                        setChoiceBooks(choiceBooks.filter(b => b.id !== id));
                        await syncWithGAS('DELETE_CHOICE', { id });
                    } else {
                        setBooks(books.filter(b => b.id !== id));
                        await syncWithGAS('DELETE_BOOK', { id });
                    }
                    showMsg('資料已刪除');
                }
            }

            const handleSaveOrder = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newId = formData.get('orderId'); 
                const updated = {
                    ...editingOrder, newId: newId, customer: formData.get('customer'), phone: formData.get('phone'), email: formData.get('email'), address: formData.get('address'),
                    items: formData.get('items'), total: parseInt(formData.get('total')) || 0, payment: formData.get('payment'), status: formData.get('status'),
                    memo: formData.get('memo') || '' // 🔥 加上寄件備註欄位
                };
                setOrders(orders.map(o => o.id === editingOrder.id ? { ...updated, id: newId || updated.id } : o));
                await syncWithGAS('UPDATE_ORDER', updated); 
                setShowOrderModal(false); setEditingOrder(null);
                showMsg('訂單完整內容已修改');
            };

            const handleSaveCarousel = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const slideData = { title: formData.get('title'), description: formData.get('description'), image: formData.get('image') || '', status: formData.get('status') };
                if (editingCarousel) {
                    const updated = { ...editingCarousel, ...slideData };
                    setCarousels(carousels.map(c => c.id === updated.id ? updated : c));
                    await syncWithGAS('UPDATE_CAROUSEL', updated);
                } else {
                    const newSlide = { ...slideData, id: Date.now() };
                    setCarousels([newSlide, ...carousels]);
                    await syncWithGAS('ADD_CAROUSEL', newSlide);
                }
                setShowCarouselModal(false); setEditingCarousel(null); showMsg('輪播設定已儲存');
            };

            const handleDeleteCarousel = async (id) => {
                if(confirm('確定要刪除此行銷輪播項目嗎？')) {
                    setCarousels(carousels.filter(c => c.id !== id));
                    await syncWithGAS('DELETE_CAROUSEL', { id }); showMsg('已刪除該輪播');
                }
            };

            const handleSaveKpi = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const inputUnit = formData.get('unit') || '';
                const combinedUnit = `${inputUnit}||${selectedKpiIcon}`;
                const kpiData = { title: formData.get('title'), value: formData.get('value'), unit: combinedUnit };
                if (editingKpi) {
                    const updated = { ...editingKpi, ...kpiData };
                    setKpis(kpis.map(k => k.id === updated.id ? updated : k));
                    await syncWithGAS('UPDATE_KPI', updated);
                } else {
                    const newKpi = { ...kpiData, id: Date.now() };
                    setKpis([...kpis, newKpi]);
                    await syncWithGAS('ADD_KPI', newKpi);
                }
                setEditingKpi(null); setShowKpiModal(false); showMsg('KPI 指標已更新');
            };

            const handleDeleteKpi = async (id) => {
                if(confirm('確定要刪除此 KPI 嗎？')) {
                    setKpis(kpis.filter(k => k.id !== id));
                    await syncWithGAS('DELETE_KPI', { id }); showMsg('KPI 已刪除');
                }
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newSettings = { ...settings };
                for (let [key, value] of formData.entries()) {
                    newSettings[key] = value;
                }
                setSettings(newSettings);
                await syncWithGAS('UPDATE_SETTINGS', newSettings);
                showMsg('系統設定已套用並同步至雲端！');
            };

            const handleGenerateAI = () => {
                if (!editingCSLog) return;
                setIsAIGenerating(true);

                        </div>
                    )}

                    {notification && <div className="fixed bottom-12 right-12 bg-zinc-900 text-white px-8 py-5 rounded-2xl shadow-2xl animate-in font-bold text-sm z-[200] flex items-center gap-3 border border-zinc-700"><CheckCircle size={20} className="text-emerald-400" /> {notification}</div>}
                </div> 
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
