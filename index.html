<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文史哲出版社 - 首頁</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 🔥 新增：配置 Tailwind 覆寫預設字型，防止重新渲染時字體跑掉 -->

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],

    </script>
    
    <!-- 鎖定 React 穩定版本 -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 解決 lucide-react UMD 載入問題 -->
    <script>window.react = window.React;</script>
    <!-- 鎖定 Babel 7.22.20 -->
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    <!-- 鎖定 Lucide 穩定版本 -->
    <script src="https://unpkg.com/lucide-react@0.284.0/dist/umd/lucide-react.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F9F6F0; }
        ::-webkit-scrollbar-thumb { background: #C4B29E; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8C5A2B; }
        
        /* 隱藏橫向滾動條，但保留滾動功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .drop-cap::first-letter {
            float: left; font-size: 3.5rem; line-height: 3rem; padding-top: 0.2rem; padding-right: 0.5rem; color: #2C241B; font-family: 'Noto Sans TC', sans-serif; font-weight: 900;
        }
    </style>
</head>
<body class="bg-[#F9F6F0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const lib = window.lucideReact || window.LucideReact || {};
        const FallbackIcon = () => <span className="inline-block w-4 h-4 bg-gray-300 rounded-full animate-pulse"></span>;
        
        const BookOpen = lib.BookOpen || FallbackIcon;
        const Globe = lib.Globe || FallbackIcon;
        const ShoppingCart = lib.ShoppingCart || FallbackIcon;
        const X = lib.X || FallbackIcon;
        const MessageCircle = lib.MessageCircle || FallbackIcon;
        const ChevronRight = lib.ChevronRight || FallbackIcon;
        const ChevronLeft = lib.ChevronLeft || FallbackIcon;
        const ChevronDown = lib.ChevronDown || FallbackIcon;
        const ChevronUp = lib.ChevronUp || FallbackIcon;
        const Database = lib.Database || FallbackIcon;
        const Clock = lib.Clock || FallbackIcon;
        const CheckCircle = lib.CheckCircle || FallbackIcon;
        const Zap = lib.Zap || FallbackIcon;
        const LayoutDashboard = lib.LayoutDashboard || FallbackIcon;
        const Trash2 = lib.Trash2 || FallbackIcon;
        const MapPin = lib.MapPin || FallbackIcon;
        const Phone = lib.Phone || FallbackIcon;
        const Printer = lib.Printer || FallbackIcon;
        const Mail = lib.Mail || FallbackIcon;
        const CreditCard = lib.CreditCard || FallbackIcon;
        const LinkIcon = lib.Link || FallbackIcon;
        const Compass = lib.Compass || FallbackIcon;
        const User = lib.User || FallbackIcon;
        const Search = lib.Search || FallbackIcon;
        const FileText = lib.FileText || FallbackIcon;
        const Plus = lib.Plus || FallbackIcon;
        const Minus = lib.Minus || FallbackIcon;
        const RefreshCw = lib.RefreshCw || FallbackIcon;
        const Sparkles = lib.Sparkles || FallbackIcon;

        const ModernLogo = ({ className = "w-8 h-8", color1 = "#2C241B", color2 = "#8C5A2B" }) => (
            <svg viewBox="0 0 40 40" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="18,30 8,10 13,8 23,28" fill={color1} />
                <polygon points="22,30 32,10 27,8 17,28" fill={color2} />
            </svg>
        );

        // 🔥 更新為最新指定的 GAS_URL
        const _0x4a21 = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3bU5WRkl2MjNqbkJvYjN0cHp1OC1pcjFGOVBpQ0d2Rk8xYlJzZWFsY3AxRjBwTERtM255aW1iMF93d1g4Wks2dS0vZXhlYw==";
        const GAS_URL = atob(_0x4a21); 
        const SECRET_KEY = "cd6ca599bdbb083d34a3012b84071c848cc4bca0698a53c3cc65a2c296dd3ddf";

        // 🔥 HMAC-SHA256 生成器 (Web Crypto API)
        async function generateSignature(message, secret) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const msgData = encoder.encode(message);
            const cryptoKey = await window.crypto.subtle.importKey(
                "raw", keyData, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]
            );
            const signatureBuffer = await window.crypto.subtle.sign("HMAC", cryptoKey, msgData);
            const hashArray = Array.from(new Uint8Array(signatureBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 圖片 URL 轉換工具 (包含 Thumbnail API 修復)
        const formatImageUrl = (url) => {
            if (!url) return '';
            let strUrl = String(url).trim();
            if (strUrl.startsWith('data:image')) return strUrl;
            
            let driveId = null;
            if (strUrl.includes('drive.google.com')) {
                const match = strUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) || strUrl.match(/id=([a-zA-Z0-9_-]+)/);
                if (match) driveId = match[1];
            } else if (/^[a-zA-Z0-9_-]{20,}$/.test(strUrl) && !strUrl.includes("/")) {
                driveId = strUrl;
            }

            if (driveId) {
                return `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
            }
            return strUrl;
        };

        const fallbackCarousels = [
            { id: 'fb1', title: '傳承千年智慧', description: '致力於出版高品質文學、歷史、哲學著作。讓深厚底蘊更貼近當代讀者。', image: 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=1200' }
        ];

        const fallbackBooks = [
            { id: 'fb_1', title: '正在向資料庫索取書籍', author: '讀取中', year: '讀取中', price: 0, category: '文學', stock: 10, cover: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400' }
        ];

        const fixedCategories = ['全部', '文學', '歷史', '哲學', '史地', '語言', '社會科學', '藝術'];

        function App() {
            const [settings, setSettings] = useState({
                systemName: '文史哲出版社',
                systemSubName: 'The Liberal Arts Press'
            });

            const [carousels, setCarousels] = useState(() => {
                const cached = localStorage.getItem('lapen_carousels_v4');
                if (cached) { try { const p = JSON.parse(cached); if(p.length > 0) return p; } catch(e) {} }
                return fallbackCarousels;
            });
            const [carouselIndex, setCarouselIndex] = useState(0); 
            
            const [books, setBooks] = useState(() => {
                const cached = localStorage.getItem('lapen_books_v4');
                if (cached) { try { const p = JSON.parse(cached); if(p.length > 0) return p.sort(() => 0.5 - Math.random()); } catch(e) {} }
                return fallbackBooks;
            });

            const [choiceBooks, setChoiceBooks] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isContactOpen, setIsContactOpen] = useState(false);
            const [notification, setNotification] = useState(null);
            
            const [isBooksLoading, setIsBooksLoading] = useState(true); 
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const [isSubmittingCS, setIsSubmittingCS] = useState(false);

            const [selectedCategory, setSelectedCategory] = useState('全部');
            const [visibleCount, setVisibleCount] = useState(8); 
            
            const [iframeModal, setIframeModal] = useState({ isOpen: false, url: '', title: '' });
            const [isAboutOpen, setIsAboutOpen] = useState(false);

            // 🔥 檢索相關狀態
            const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
            const [searchForm, setSearchForm] = useState({ code: '', title: '', author: '', year: '', category: '' });
            const [appliedSearch, setAppliedSearch] = useState({ code: '', title: '', author: '', year: '', category: '' });
            const [searchVisibleCount, setSearchVisibleCount] = useState(8);

            // 🔥 隨機推薦相關狀態
            const [isRandomBooksOpen, setIsRandomBooksOpen] = useState(false);
            const [randomBooks, setRandomBooks] = useState([]);
            
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [showBackToTop, setShowBackToTop] = useState(false);
            
            const sliderRef = useRef(null);

            const showMsg = (text) => {
                setNotification(text);
                setTimeout(() => setNotification(null), 3000);
            };

            useEffect(() => {
                const handleScroll = () => {
                    setShowBackToTop(window.scrollY > 300);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // 🔥 軍規級前端 fetch 模組 (支援 HMAC-SHA256)
            const syncWithGAS = async (action, payloadData = null) => {
                try {
                    const payloadObj = { 
                        action: action, 
                        payload: payloadData,
                        origin: window.location.origin
                    };
                    const payloadStr = JSON.stringify(payloadObj);
                    const timestamp = Date.now().toString();
                    
                    const messageToSign = payloadStr + timestamp;
                    const signature = await generateSignature(messageToSign, SECRET_KEY);

                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({
                            payload: payloadStr,
                            timestamp: timestamp,
                            signature: signature
                        })
                    });
                    return await response.json();
                } catch (e) {
                    console.error("GAS Sync Error:", e);
                    return { status: 'error', msg: e.toString() };
                }
            };

            useEffect(() => {
                syncWithGAS('FETCH_SETTINGS').then(resSettings => {
                    if (resSettings && resSettings.data) {
                        setSettings(prev => ({...prev, ...resSettings.data}));
                        if (resSettings.data.systemName) document.title = `${resSettings.data.systemName} - 首頁`;
                    }
                }).catch(() => {});

                syncWithGAS('FETCH_CAROUSELS').then(resCarousels => {
                    if (resCarousels && Array.isArray(resCarousels.data)) {
                        const published = resCarousels.data.filter(c => c.status === '已發佈');
                        if (published.length > 0) {
                            setCarousels(published);
                            localStorage.setItem('lapen_carousels_v4', JSON.stringify(published));
                        }
                    }
                }).catch(() => {});

                syncWithGAS('FETCH_CHOICES').then(resChoices => {
                    if (resChoices && Array.isArray(resChoices.data)) {
                        const validChoices = resChoices.data.filter(b => b.title && b.title.trim() !== '' && b.title !== '未命名書籍');
                        setChoiceBooks(validChoices);
                    }
                }).catch(() => {});

                syncWithGAS('FETCH_BOOKS').then(resBooks => {
                    if (resBooks && Array.isArray(resBooks.data)) {
                        const validBooks = resBooks.data.filter(b => b.title && b.title.trim() !== '' && b.title !== '未命名書籍');
                        const shuffledBooks = validBooks.sort(() => 0.5 - Math.random());
                        setBooks(shuffledBooks);
                        try { localStorage.setItem('lapen_books_v4', JSON.stringify(shuffledBooks.slice(0, 150))); } catch (e) {}
                    }
                }).finally(() => {
                    setIsBooksLoading(false);
                });
            }, []);

            useEffect(() => {
                if (carousels.length <= 1) return;
                const timer = setInterval(() => setCarouselIndex((prev) => (prev + 1) % carousels.length), 5000); 
                return () => clearInterval(timer);
            }, [carousels.length]);

            const dynamicCategories = useMemo(() => {
                const cats = books.map(b => b.category).filter(c => c && c.trim() !== "");
                return [...new Set([...fixedCategories, ...cats])];
            }, [books]);

            const excelCategories = useMemo(() => {
                const cats = books.map(b => b.category).filter(c => c && c.trim() !== "");
                return [...new Set(cats)].sort();
            }, [books]);

            const filteredBooks = useMemo(() => {
                if (selectedCategory === '全部') return books;
                return books.filter(b => b.category === selectedCategory);
            }, [books, selectedCategory]);

            const visibleBooks = filteredBooks.slice(0, visibleCount);
            const displayChoiceBooks = choiceBooks.length > 0 ? choiceBooks : books.slice(0, 10);

            // 🔥 檢索邏輯
            const handleSearchSubmit = (e) => {
                e.preventDefault();
                setAppliedSearch(searchForm);
                setSearchVisibleCount(8);
            };

            const indexSearchBooks = useMemo(() => {
                return books.filter(b => {
                    const matchCode = !appliedSearch.code || (b.id && b.id.toString().includes(appliedSearch.code));
                    const matchTitle = !appliedSearch.title || (b.title && b.title.includes(appliedSearch.title));
                    const matchAuthor = !appliedSearch.author || (b.author && b.author.includes(appliedSearch.author));
                    const matchYear = !appliedSearch.year || (b.year && b.year.toString().includes(appliedSearch.year));
                    const matchCat = !appliedSearch.category || appliedSearch.category === '全部' || b.category === appliedSearch.category;
                    return matchCode && matchTitle && matchAuthor && matchYear && matchCat;
                });
            }, [books, appliedSearch]);

            const visibleSearchBooks = indexSearchBooks.slice(0, searchVisibleCount);

            const addToCart = (book) => {
                if (book.stock <= 0) return showMsg("抱歉，目前缺貨中！");
                const existing = cart.find(i => i.id === book.id);
                if (existing) setCart(cart.map(i => i.id === book.id ? {...i, qty: i.qty + 1} : i));
                else setCart([...cart, {...book, qty: 1}]);
                showMsg(`已加入書包: ${book.title}`);
            };

            const removeFromCart = (id) => setCart(cart.filter(i => i.id !== id));
            
            const updateCartQty = (id, delta) => {
                setCart(cart.map(i => {
                    if (i.id === id) {
                        const newQty = i.qty + delta;
                        if (newQty < 1) return i; 
                        if (newQty > i.stock) {
                            showMsg("已達該書目前庫存上限！");
                            return i;
                        }
                        return { ...i, qty: newQty };
                    }
                    return i;
                }));
            };

            const cartTotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (isCheckingOut) return;
                
                setIsCheckingOut(true);
                showMsg("訂單處理中，請稍候，請勿關閉視窗...");
                
                const formData = new FormData(e.target);
                const info = Object.fromEntries(formData);
                
                const now = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                const formattedDate = `${now.getFullYear()}/${pad(now.getMonth() + 1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                
                const itemsStr = cart.map(i => `${i.title} (數量: ${i.qty})`).join('\n');
                
                let orderId = `ORD-${Math.floor(Math.random() * 10000)}`;
                try {
                    const resOrders = await syncWithGAS('FETCH_ORDERS');
                    if (resOrders && Array.isArray(resOrders.data)) {
                        const nextNum = resOrders.data.length + 1;
                        orderId = `ORD-${String(nextNum).padStart(4, '0')}`;
                    }
                } catch(error) {}

                const newOrder = {
                    id: orderId, customer: info.name, phone: info.phone, email: info.email, address: info.address, payment: info.payment,
                    items: itemsStr, total: cartTotal, status: '處理中', date: formattedDate,
                    memo: info.memo || '',
                    '訂單編號': orderId, '客戶姓名': info.name, '電話': info.phone, '電子信箱': info.email, 'Email': info.email,
                    '地址': info.address, '付款方式': info.payment, '購買項目': itemsStr, '總金額': cartTotal, '狀態': '處理中', '日期': formattedDate
                };
                
                await syncWithGAS('CREATE_ORDER', newOrder);
                
                setBooks(books.map(b => {
                    const ci = cart.find(c => c.id === b.id);
                    return ci ? { ...b, stock: b.stock - ci.qty } : b;
                }));
                
                setCart([]); 
                setIsCheckingOut(false);
                setIsCartOpen(false);
                showMsg(`訂單已成功送出！您的單號為：${orderId}`);
            };

            const handleCSSubmit = async (e) => {
                e.preventDefault();
                if (isSubmittingCS) return;
                
                setIsSubmittingCS(true);
                showMsg("訊息傳送中，請稍候...");
                
                const name = e.target.name.value;
                const phone = e.target.phone.value;
                const email = e.target.email.value;
                const msg = e.target.message.value;
                
                const combinedQuery = `【聯絡電話】${phone}\n【Email信箱】${email}\n─────────────────\n【反映內容】\n${msg}`;

                const newLog = { id: Date.now(), platform: 'Web官網', user: name, query: combinedQuery };
                await syncWithGAS('NEW_CS_MSG', newLog);
                
                setIsSubmittingCS(false);
                setIsContactOpen(false);
                showMsg("感謝您的反映，客服專員將盡快回覆！");
            };

            // 🔥 開啟隨機推薦書籍 (新書上市)
            const openRandomBooksModal = () => {
                if (books.length > 0) {
                    const shuffled = [...books].sort(() => 0.5 - Math.random());
                    setRandomBooks(shuffled.slice(0, 8));
                }
                setIsRandomBooksOpen(true);
            };

            const scrollSlider = (direction) => {
                if (sliderRef.current) {
                    const { scrollLeft, clientWidth } = sliderRef.current;
                    const scrollTo = direction === 'left' ? scrollLeft - clientWidth * 0.8 : scrollLeft + clientWidth * 0.8;
                    sliderRef.current.scrollTo({ left: scrollTo, behavior: 'smooth' });
                }
            };

            return (
                <div className="selection:bg-[#8C5A2B] selection:text-white min-h-screen bg-[#FDFBF7] font-serif transition-all duration-300 relative pb-10 scroll-smooth flex flex-col">
                    {/* 導覽列 */}
                    <nav className="p-4 md:px-8 border-b border-[#E6D5C3] flex justify-between items-center bg-white/95 backdrop-blur-md sticky top-0 z-40 shadow-sm relative">
                        <div className="flex items-center space-x-2 md:space-x-4 cursor-pointer select-none" onClick={() => {
                            if (window.innerWidth < 1024) setIsMobileMenuOpen(!isMobileMenuOpen);
                            else window.scrollTo(0,0);
                        }}>
                            <ModernLogo className="w-8 h-8 md:w-10 md:h-10" />
                            <div className="flex flex-col">
                                <div className="flex items-center gap-1">
                                    <h1 className="text-lg md:text-[22px] font-black text-[#2C241B] tracking-[0.1em] font-sans">{settings.systemName || '文史哲出版社'}</h1>
                                    <ChevronDown className={`lg:hidden transition-transform text-[#8C5A2B] ${isMobileMenuOpen ? 'rotate-180' : ''}`} size={16} />
                                </div>
                                <span className="text-[8px] md:text-[9px] tracking-[0.22em] text-[#8C5A2B] font-sans font-bold uppercase block">{settings.systemSubName || 'The Liberal Arts Press'}</span>
                            </div>
                        </div>

                        <div className="flex items-center space-x-4 md:space-x-6">
                            <div className="hidden lg:flex space-x-8 text-[15px] font-sans font-bold text-[#4A3728]">
                                <button type="button" onClick={() => setIsAboutOpen(true)} className="hover:text-[#8C5A2B] transition flex items-center gap-1.5"><Compass size={16}/> 關於我們</button>
                                <button type="button" onClick={() => setIframeModal({ isOpen: true, url: 'https://hanlinma.github.io/candyni/%E9%97%9C%E6%96%BC%E7%A4%BE%E9%95%B7.html', title: '關於社長' })} className="hover:text-[#8C5A2B] transition flex items-center gap-1.5"><User size={16}/> 關於社長</button>
                                <button type="button" onClick={() => setIframeModal({ isOpen: true, url: 'https://hanlinma.github.io/candyni/%E8%81%AF%E7%B9%AB%E6%88%91%E5%80%91.html', title: '聯繫我們' })} className="hover:text-[#8C5A2B] transition flex items-center gap-1.5"><MessageCircle size={16}/> 聯繫我們</button>
                                <button type="button" onClick={openRandomBooksModal} className="hover:text-[#8C5A2B] transition flex items-center gap-1.5"><Zap size={16}/> 新書上市</button>
                                <button type="button" onClick={() => setIsSearchModalOpen(true)} className="hover:text-[#F9F6F0] transition flex items-center gap-1.5 text-[#F9F6F0] bg-[#2C241B] hover:bg-[#8C5A2B] px-4 py-1.5 rounded-full shadow-sm"><Search size={16}/> 書籍檢索</button>
                            </div>
                            
                            <div className="flex items-center space-x-3 md:space-x-4 border-l pl-3 md:pl-4 border-[#E6D5C3]">
                                <button type="button" onClick={() => setIsCartOpen(true)} className="relative bg-[#F9F6F0] border border-[#C4B29E] text-[#2C241B] px-3 md:px-5 py-2.5 rounded-full flex items-center gap-2 hover:bg-[#8C5A2B] hover:text-white hover:border-[#8C5A2B] transition-all shadow-sm font-sans font-bold group">
                                    <ShoppingCart size={20} className="group-hover:scale-110 transition-transform" />
                                    <span className="hidden sm:inline">我的書包</span>
                                    {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-red-600 text-white text-[12px] min-w-[24px] h-6 px-1 rounded-full flex items-center justify-center font-bold shadow-md border-2 border-white animate-bounce">{cart.length}</span>}
                                </button>
                                <button type="button" onClick={() => window.open('admin.html', '_blank')} className="hidden sm:flex bg-[#2C241B] text-[#F9F6F0] px-4 py-2.5 rounded-full text-sm font-sans items-center gap-2 hover:bg-[#8C5A2B] transition shadow-md font-bold">
                                    <LayoutDashboard size={16} /> <span className="hidden md:inline">管理入口</span>
                                </button>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="absolute top-full left-0 w-full bg-white border-b border-[#E6D5C3] shadow-xl flex flex-col p-2 lg:hidden z-50 animate-in font-sans">

                                </div>

                                {cart.length > 0 && (
                                    <div className="w-full md:w-[400px] lg:w-[450px] bg-white p-6 shadow-[-10px_0_20px_rgba(0,0,0,0.02)] flex flex-col shrink-0 h-auto md:h-[90vh] md:overflow-y-auto">
                                        <div className="hidden md:flex justify-end mb-6">
                                            <button type="button" onClick={() => setIsCartOpen(false)} className="bg-[#F9F6F0] border border-[#C4B29E] hover:bg-[#E6D5C3] px-4 py-2 rounded-full text-sm font-bold text-[#4A3728] transition flex items-center gap-1 shadow-sm"><X size={16} /> 關閉</button>
                                        </div>
                                        <div className="flex flex-col gap-2 bg-[#F9F6F0] p-5 rounded-xl border border-[#E6D5C3] mb-6">
                                            <div className="text-[#4A3728] text-sm font-bold text-left">共 {cart.reduce((s, i) => s + i.qty, 0)} 本書</div>
                                            <div className="flex items-baseline justify-between mt-1 text-left border-t border-[#E6D5C3] pt-3">
                                                <span className="font-bold text-[#2C241B] text-xl">總計金額</span>
                                                <span className="text-4xl font-black text-[#8C5A2B]">NT$ {cartTotal.toLocaleString()}</span>
                                            </div>
                                        </div>
                                        <form onSubmit={handleCheckout} className="space-y-4 flex-1 flex flex-col">
                                            <div className="text-sm font-bold text-[#8C5A2B] border-b border-[#E6D5C3] pb-2 mb-2 flex items-center gap-2"><MapPin size={16} /> 填寫收件資訊</div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-xs font-bold text-gray-500 mb-1">收件人姓名</label><input name="name" required className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm outline-none" /></div>
                                                <div><label className="block text-xs font-bold text-gray-500 mb-1">聯絡電話</label><input name="phone" required className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm outline-none" /></div>
                                            </div>
                                            <div><label className="block text-xs font-bold text-gray-500 mb-1">電子信箱 Email</label><input name="email" type="email" required className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm outline-none" /></div>
                                            <div><label className="block text-xs font-bold text-gray-500 mb-1">詳細寄送地址</label><input name="address" required className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm outline-none" /></div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-500 mb-1">付款方式</label>
                                                <select name="payment" className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm font-bold text-[#2C241B] outline-none">
                                                    <option value="店取付現金">店取付現金 (預設)</option>
                                                    <option value="銀行轉帳">銀行轉帳</option>
                                                    <option value="線上刷卡">線上刷卡</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-500 mb-1">寄件備註 (選填)</label>
                                                <textarea name="memo" placeholder="若有特殊收件需求請填寫於此..." className="w-full border-2 border-[#E6D5C3] p-3 rounded-xl focus:border-[#8C5A2B] bg-[#F9F6F0] text-sm outline-none h-16 resize-none"></textarea>
                                            </div>
                                            <button disabled={isCheckingOut} className={`w-full bg-[#2C241B] text-white py-4 rounded-xl font-bold mt-auto shadow-lg transition-colors flex justify-center items-center gap-2 text-lg mb-6 md:mb-0 ${isCheckingOut ? 'opacity-50 cursor-not-allowed' : 'hover:bg-[#8C5A2B] active:scale-[0.98]'}`}>
                                                {isCheckingOut ? <Clock className="animate-spin" size={22} /> : <CheckCircle size={22} />}
                                                {isCheckingOut ? '訂單處理中...' : '確認結帳下單'}
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* 外部 iframe 彈出視窗 */}
                    {iframeModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] flex justify-center items-center p-4 md:p-8" onClick={() => setIframeModal(prev => ({ ...prev, isOpen: false }))}>
                            <div className="bg-[#F9F6F0] w-full max-w-5xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in font-sans border border-[#E6D5C3]" onClick={(e) => e.stopPropagation()}>
                                <div className="p-4 md:p-5 border-b-2 border-[#E6D5C3] flex justify-between items-center bg-white">
                                    <h2 className="text-xl font-black flex items-center gap-3 text-[#2C241B] font-serif tracking-widest">{iframeModal.title}</h2>
                                    <button type="button" onClick={() => setIframeModal(prev => ({ ...prev, isOpen: false }))} className="bg-[#F9F6F0] border border-[#C4B29E] hover:bg-[#E6D5C3] px-4 py-2 rounded-full text-sm font-bold text-[#4A3728] transition flex items-center gap-2 shadow-sm"><X size={16} /> 關閉</button>
                                </div>
                                <div className="flex-1 w-full bg-white relative overflow-y-auto" style={{ WebkitOverflowScrolling: 'touch' }}>
                                    {iframeModal.url && <iframe src={iframeModal.url} className="w-full h-full border-0 min-h-[600px]"></iframe>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 🔥 彈出通知 */}
                    {notification && (
                        <div className="fixed bottom-24 md:bottom-10 right-8 bg-[#2C241B] text-white px-6 py-4 rounded-xl shadow-2xl animate-in font-bold text-[15px] z-[300] flex items-center gap-3 border-l-4 border-[#8C5A2B]">
                            <CheckCircle size={20} className="text-[#C4B29E]" /> {notification}
                        </div>
                    )}
                </div> 
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
